<!DOCTYPE html>
<html lang=zh-CN>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>自我关系健康度多维自测</title>
<style>
:root{--bg:#faf7f4;--surface:#fff;--border:#ede8e2;--text:#3d352e;--text2:#8a7f76;--primary:#b8865b;--pb:#f8f0e8;--ab:#eef4ee;--rb:#f8edeb;--f:-apple-system,PingFang SC,Microsoft YaHei,sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--text);font-size:15px;line-height:1.7}
.hd{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:10}
.hd h1{font-size:17px;color:var(--primary);font-weight:700}
.hd p{font-size:12px;color:var(--text2);margin-top:1px}
.mn{max-width:640px;margin:0 auto;padding:16px 14px 50px}
.sc{display:none}
.sc.s{display:block}
.stp{text-align:center;margin-bottom:16px;font-size:12px;color:var(--text2)}
.stp b{color:var(--primary)}
.wl{text-align:center;padding:36px 16px}
.wl h2{font-size:21px;color:var(--primary);margin-bottom:10px}
.wl p{color:var(--text2);font-size:14px;margin-bottom:20px;line-height:1.8}
.dh{font-size:14px;font-weight:600;color:var(--primary);padding:10px 12px;background:var(--pb);border-radius:8px;margin-bottom:10px;border-left:4px solid var(--primary)}
.q{margin-bottom:14px;padding:12px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}
.qt{font-size:13px;margin-bottom:8px;font-weight:500;line-height:1.6}
.op{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.op label{padding:7px 0;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s;text-align:center;min-height:38px;display:flex;align-items:center;justify-content:center}
.op input:checked+label{background:var(--primary);color:#fff;border-color:var(--primary)}
.op input{display:none}
.btn{display:inline-flex;align-items:center;gap:4px;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:0;font-family:var(--f)}
.btn.bp{background:var(--primary);color:#fff}
.btn.bp:hover{opacity:.85}
.btn.bo{background:0 0;border:1px solid var(--border);color:var(--text2)}
.btns{display:flex;justify-content:space-between;margin-top:16px}
.rs{padding:16px 0}
.rs h2{font-size:18px;color:var(--primary);margin-bottom:4px}
.rs .sub{color:var(--text2);font-size:12px;margin-bottom:14px}
.cw{display:flex;justify-content:center;margin:8px 0 16px}
.cw canvas{max-width:100%;height:auto}
.scr{display:grid;gap:12px;margin-bottom:20px}
.sb{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.sbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.sbn{font-weight:600;font-size:13px}
.sbv{font-size:16px;font-weight:700;color:var(--primary)}
.sbb{height:5px;border-radius:3px;background:var(--border);margin-top:2px;overflow:hidden}
.sbf{height:100%;border-radius:3px;transition:width .8s}
.sbt{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.cta{text-align:center;padding:22px 16px;background:var(--pb);border-radius:10px;margin:16px 0}
.cta h3{color:var(--primary);font-size:16px;margin-bottom:4px}
.cta p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.7}
.cta .btn{font-size:15px;padding:10px 28px;border-radius:10px}
.note{text-align:center;font-size:11px;color:#b5aba0;margin-top:20px;padding:12px 0 0;border-top:1px solid var(--border)}
.ov{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.ovr{font-size:32px;font-weight:700;color:var(--primary);text-align:center}
.ovl{text-align:center;font-size:13px;color:var(--text2);margin-top:2px;margin-bottom:8px;font-weight:500}
.ovd{font-size:13px;color:var(--text);line-height:1.8;padding:0 2px}
.ovd b{color:var(--primary)}
.ovb{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin:8px 0}
.ovf{height:100%;border-radius:4px;transition:width 1s}
.hl{display:flex;gap:8px;margin-bottom:16px}
.hlb{flex:1;padding:10px;border-radius:8px;text-align:center}
.hlb1{background:#f0f7f0;border:1px solid #dce8dc}
.hlb2{background:var(--rb);border:1px solid #f0ddd9}
.hlbt{font-size:11px;color:var(--text2);margin-bottom:2px}
.hlbv{font-size:15px;font-weight:700}
.hlbs{font-size:11px;color:var(--text2);margin-top:1px}
.lvl{display:flex;flex-wrap:wrap;gap:4px 12px;justify-content:center;margin-bottom:10px}
.lv{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.lvd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media(min-width:480px){.op{grid-template-columns:1fr 1fr 1fr}.wl h2{font-size:24px}.hd h1{font-size:19px}.rs h2{font-size:20px}}
</style>
<body>
<div class=hd><h1>自我关系健康度多维自测</h1><p>了解你与自己关系的 7 个核心维度</p></div>
<div class=mn id=app>
<div class="sc s" id=s0>
<div class=wl><h2>开始自测</h2><p>请根据你最近一个月的真实感受作答。<br>共 28 题，约需 5-8 分钟。<br>完成后将为你生成详细的多维分析报告。</p><button type=button class="btn bp" id=startBtn>开始测评</button></div>
</div>
<div class=sc id=sf></div>
<div class=sc id=sr></div>
</div>
<script>
var D=[
{id:0,n:"自我认知与价值感",q:["我清楚地知道自己的核心优势、热情所在和价值观","我能接纳自己的不完美与局限性，不因此进行自我攻击","我的自我价值感主要来源于内在，而非完全依赖外界评价","当与他人比较时，我能快速调整心态，专注于自己的节奏和成长"],c:"#b8865b"},
{id:1,n:"情绪觉察与管理",q:["当情绪升起时，我能很快识别并命名它","我允许自己充分体验情绪，而不急于用理性分析将其压抑","我有健康的方式疏导强烈情绪","我能对自己产生同理心，理解情绪背后未被满足的需求"],c:"#7a9e7e"},
{id:2,n:"身体联结与关怀",q:["我能敏锐地觉察身体发出的信号并主动调整","我会主动进行让身体感到舒适和愉悦的活动","我尊重身体的极限，不会强迫其超负荷工作","我认为身体是盟友而非工具，感激它的支持"],c:"#c4837a"},
{id:3,n:"内在对话与边界",q:["我的内在对话通常是鼓励支持性的，而非批评指责性的","我能坦然为自己设定边界，敢于说'不'","在关系中我既能保持亲密又不失去自我","我能以尊重的方式表达被冒犯或消耗的感受"],c:"#8a7530"},
{id:4,n:"需求满足与人生状态",q:["我能清晰感知并优先满足自己的核心需求","我生活中常有滋养和充电的仪式或小事","我的人生选择源于内心渴望而非外在压力","我感到生活是自主充实且有意义的"],c:"#6b8fa3"},
{id:5,n:"自我关爱与支持",q:["遇到挫折时我会首先给予自己温暖的理解和安慰","我会主动安排专属关爱时刻并视之为重要日程","我能将自我批判转化为更友善的自我对话","我能识别并满足自己的情感需求，允许脆弱"],c:"#9b7eb5"},
{id:6,n:"内在自信与勇气",q:["我相信自己有能力面对大多数挑战并从中成长","做决定时我信任自己的判断，即使他人不认同","我敢于表达真实想法和感受，即使有风险","面对新机会我鼓励自己尝试而非退缩"],c:"#d4946a"}
];
var OP=["很少或从未(0分)","偶尔(1分)","有时(2分)","经常(3分)","总是(4分)"],OV=[0,1,2,3,4];
var a={},cs=0;

document.getElementById("startBtn").addEventListener("click",function(){cs=0;showQ()});


function showQ(){
 var m=document.getElementById("sf");m.className="sc s";m.innerHTML="";
 document.getElementById("s0").className="sc";
 var dn=D[cs];
 var h='<div class=stp>维度 <b>'+(cs+1)+"</b> / 7</div>";
 h+='<div class=dh style="border-left-color:'+dn.c+'">'+(cs+1)+'. '+dn.n+"</div>";
 for(var i=0;i<dn.q.length;i++){
  var k=cs+"_"+i;
  h+='<div class=q><div class=qt>'+(i+1)+". "+dn.q[i]+'</div><div class=op>';
  for(var j=0;j<OP.length;j++){var ck=a[k]===j?" checked":"";h+='<input type=radio name=q'+k+' id=q'+k+'_'+j+' value='+j+ck+' onchange=a["'+k+'"]='+j+'><label for=q'+k+'_'+j+'>'+OP[j]+"</label>"}
  h+="</div></div>"
 }
 h+='<div class=btns>';
 if(cs>0){h+='<button type=button class="btn bo" onclick=cs--;showQ()>上一页</button>'}else{h+="<span></span>"}
 if(cs<6){h+='<button type=button class="btn bp" onclick=nextQ()>下一步</button>'}else{h+='<button type=button class="btn bp" onclick=showR()>查看报告</button>'}
 h+="</div>";m.innerHTML=h
}
function nextQ(){
 var dn=D[cs];var ok=1;
 for(var i=0;i<dn.q.length;i++){if(a[cs+"_"+i]===undefined){ok=0;break}}
 if(!ok){alert("请完成本页所有题目后再继续");return}
 cs++;showQ()
}
function lv(p){
 if(p<20)return{name:"深度关怀",color:"#b34a4a",bg:"rgba(179,74,74,0.08)"};
 if(p<40)return{name:"需要改善",color:"#c4837a",bg:"rgba(196,131,122,0.1)"};
 if(p<60)return{name:"有待提升",color:"#d4946a",bg:"rgba(212,148,106,0.1)"};
 if(p<80)return{name:"良好状态",color:"#7a9e7e",bg:"rgba(122,158,126,0.1)"};
 return{name:"优秀健康",color:"#4a7a5a",bg:"rgba(74,122,90,0.1)"}
}
var DI=[
 ["你清晰地知道自己是谁、想要什么。面对外界评价时，你有稳定的内在锚点。","你对自我认知有一定基础，但在接纳不足和减少比较方面可提升。","你的自我认知较模糊，价值感容易依赖外界评价。建议每天记录一件小事。"],
 ["你能良好觉察和管理情绪，健康疏导并同理自己。","有一定情绪管理基础，但在充分体验情绪方面可更放开。","需更多练习情绪觉察，可先从深呼吸3次和命名情绪开始。"],
 ["你与身体关系健康，能敏锐感知信号并主动关怀。","有照顾身体的意识，但主动安排和尊重极限方面可提升。","与身体联结较弱，建议从每日5分钟身体扫描开始。"],
 ["内在对话友善而坚定，关系中有清晰的边界感。","在边界和表达方面有基础，可在小事上练习说不。","内在批评较强，边界设立有挑战，从安全的小事开始。"],
 ["清晰感知核心需求，主动创造滋养的生活。","有需求满足意识，但滋养习惯不够稳定。","常把需求放最后。优先满足自己是给予他人的基础。"],
 ["像对待挚友一样关爱自己，给予温暖和支持。","有自我关爱意识但执行不稳定，建议写入日程。","对自己较严格，可从自我安慰的小动作开始。"],
 ["信任自己的力量，敢于表达和尝试，自信扎实。","有内在勇气，可在信任判断和表达方面更坚定。","自信需支持，从每日肯定和小成就记录开始。"]
];
var OA=[
 {t:"深度关怀与支持阶段",min:0,max:28,s:"你可能已经独自支撑了很久。忽略自己的感受、勉强自己去承担——内在的能量正在被消耗。<br><br>你可能感到：持续的疲惫（即使休息也难以恢复）、对很多事情失去兴趣和动力、容易陷入自我怀疑、在关系中感到过度消耗……<br><br><b>这些都不是你的错。</b>如果自我调节已经不够了，寻求专业支持是对自己最负责的选择。"},
 {t:"初步觉察与启动阶段",min:29,max:56,s:"你已经开始看到自己的一些模式了——总是不好意思拒绝，休息时有隐隐的内疚感。你知道这样很累。<br><br>但"知道"归知道，关键时刻旧惯性还是会把你拉回去。<b>这不是因为你不够努力，而是潜意识里的旧信念在困住你。</b><br><br>先找到最常卡住你的那一个部分。"},
 {t:"系统调整与重建阶段",min:57,max:70,s:"你对自己有比较清晰的觉察，也有改变的意愿。但头绪太多，某个卡点反复出现。<br><br>这个阶段，你需要的不是更多的方法，<b>而是找到最关键的那个卡点，精准面对它。</b><br><br>看看下面哪个维度分数最低，从那里开始。"},
 {t:"稳定发展与局部优化阶段",min:71,max:84,s:"你与自己相处得不错，大部分时候能照顾好自己的感受、守住边界。<br><br>但还有个别领域会反复困扰你。你不需要大修大补。<br><br>看看分数相对低的维度——那里往往藏着你的下一个成长空间。"},
 {t:"深度融洽与滋养阶段",min:85,max:112,s:"你的自我关系整体健康稳固。你懂得如何滋养自己，内耗较少。<br><br>在这个阶段，成长不再是修复问题，而是<b>拓展更多可能性</b>。<br><br>你的高分说明你有能力去面对那些还不够完美的地方。"}
];
function showR(){
 for(var d=0;d<7;d++){for(var i=0;i<4;i++){if(a[d+"_"+i]===undefined){alert("请完成所有题目");cs=d;showQ();return}}}
 var sc=[];for(var d=0;d<7;d++){var s=0;for(var i=0;i<4;i++){s+=OV[a[d+"_"+i]]}sc.push(s)}
 var tt=sc.reduce(function(x,y){return x+y},0);var tp=Math.round(tt/112*100);
 var oa=OA[0];for(var o=0;o<OA.length;o++){if(tt>=OA[o].min&&tt<=OA[o].max){oa=OA[o];break}}
 document.getElementById("sf").className="sc";document.getElementById("s0").className="sc";
 var sr=document.getElementById("sr");sr.className="sc s";
 var h='<div class=rs><h2>你的自我关系分析报告</h2><div class=sub>测评日期：'+new Date().toISOString().split("T")[0]+"</div>";
 h+='<div class=ov><div class=ovr>'+tt+'<span style=font-size:13px;color:var(--text2)> / 112</span></div><div class=ovl>'+oa.t+'</div><div class=ovb><div class=ovf style="width:'+tp+'%;background:'+lv(tp).color+'"></div></div><div class=ovd>'+oa.s+"</div></div>";
 var hi=0,li=0;
 for(var d=1;d<7;d++){if(sc[d]>sc[hi])hi=d;if(sc[d]<sc[li])li=d}
 h+='<div class=hl><div class="hlb hlb1"><div class=hlbt>最强维度</div><div class=hlbv style=color:'+D[hi].c+'>'+D[hi].n+'</div><div class=hlbs>'+sc[hi]+'/16 分</div></div><div class="hlb hlb2"><div class=hlbt>待提升维度</div><div class=hlbv style=color:'+D[li].c+'>'+D[li].n+'</div><div class=hlbs>'+sc[li]+'/16 分</div></div></div>';
 h+='<div class=cw><canvas id=radar width=280 height=280></canvas></div>';
 h+='<div class=lvl><div class=lv><span class=lvd style=background:#b34a4a></span>深度关怀</div><div class=lv><span class=lvd style=background:#c4837a></span>需要改善</div><div class=lv><span class=lvd style=background:#d4946a></span>有待提升</div><div class=lv><span class=lvd style=background:#7a9e7e></span>良好状态</div><div class=lv><span class=lvd style=background:#4a7a5a></span>优秀健康</div></div>';
 h+='<div class=scr>';
 for(var d=0;d<7;d++){var s=sc[d],p=s/16*100;var tl2=lv(p);var txt=DI[d][p<40?2:p<60?1:0];h+='<div class=sb><div class=sbh><span class=sbn style=color:'+D[d].c+'>'+D[d].n+'</span><span class=sbv>'+s+'<span style=font-size:11px;font-weight:400;color:var(--text2)> / 16</span></span></div><div class=sbb><div class=sbf style="width:'+Math.round(p)+'%;background:'+tl2.color+'"></div></div><div style=display:flex;gap:5px;align-items:center;margin-top:4px><span style=font-size:11px;padding:1px 8px;border-radius:8px;background:'+tl2.bg+';color:'+tl2.color+';font-weight:500>'+tl2.name+'</span><span class=sbt>'+txt+'</span></div></div>'}
 h+="</div>";
 h+='<div class=cta><h3>想深入探索这些卡点吗？</h3><p>预约一次 30 分钟西塔疗愈体验（29.9 元），帮你聚焦在最需要突破的维度上。</p><button type=button class="btn bp" onclick=alert("请添加微信联系我预约体验")>预约体验</button></div>';
 h+='<div class=note>本测评仅供参考，不作为诊断依据</div></div>';sr.innerHTML=h;setTimeout(function(){drawRadar(sc)},100)
}
function drawRadar(sc){
 var cv=document.getElementById("radar");if(!cv)return;
 var s=Math.min(cv.parentElement.offsetWidth||280,280);
 cv.width=s;cv.height=s;
 var cx=cv.getContext("2d");var r=s*0.38,xc=s/2,yc=s/2;cx.clearRect(0,0,s,s);
 for(var g=1;g<=5;g++){var gr=r*g/5;cx.beginPath();for(var i=0;i<=7;i++){var a2=Math.PI/2-Math.PI*2*(i%7)/7;var x=xc+Math.cos(a2)*gr,y=yc-Math.sin(a2)*gr;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.strokeStyle="#ede8e2";cx.stroke()}
 cx.font=(s*0.045)+"px sans-serif";cx.fillStyle="#8a7f76";cx.textAlign="center";cx.textBaseline="middle";
 for(var i=0;i<7;i++){var a2=Math.PI/2-Math.PI*2*i/7;var lr=r+s*0.065;var x=xc+Math.cos(a2)*lr,y=yc-Math.sin(a2)*lr;cx.textAlign=x<xc-s*0.05?"right":x>xc+s*0.05?"left":"center";cx.fillText(D[i].n.substring(0,5),x,y)}
 cx.beginPath();for(var i=0;i<=7;i++){var idx=i%7;var v=sc[idx]/16;var a2=Math.PI/2-Math.PI*2*idx/7;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.strokeStyle="#b8865b";cx.lineWidth=2.5;cx.stroke();
 cx.beginPath();for(var i=0;i<=7;i++){var idx=i%7;var v=sc[idx]/16;var a2=Math.PI/2-Math.PI*2*idx/7;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.fillStyle="rgba(184,134,91,0.12)";cx.fill();
 for(var i=0;i<7;i++){var v=sc[i]/16;var a2=Math.PI/2-Math.PI*2*i/7;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;cx.beginPath();cx.arc(x,y,s*0.016,0,Math.PI*2);cx.fillStyle=D[i].c;cx.fill()}
}
</script>
</body>
</html>
