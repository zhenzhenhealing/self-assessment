<body>

<script>
var DC=["自我认知与价值感","情绪觉察与管理","身体联结与关怀","内在对话与边界","需求满足与人生状态","自我关爱与支持","内在自信与勇气"];

var _ls="hz_hl";var diag={n:"",d:"",i:"",f:[5,5,5,5,5,5,5,5],f2:null,b:["","","","","","","","","",""],a:""};var s=[];var r=[];var ed=-1;var er=-1;
var mgr={c:null,cs:{}};var GIST_TOKEN=localStorage.getItem('hz_token')||'';var GIST_ID=localStorage.getItem('hz_gid')||'';

h+='<div class=cd><div class=ch><span class=ct>✦ 你的疗愈之旅</span></div><div class=ovd>';if(diag.d||diag.i){h+="<b>开始：</b>"+(diag.d||"-")+"<br><b>议题：</b>"+(diag.i||"-")+"<br>"}if(diag.n){h+="<b>来访：</b>"+diag.n+"<br>"}if(diag.a){h+="<b>备注：</b>"+diag.a+"<br>"}h+="</div></div>";

h+='<div class=lv>';for(var j=0;j<FC.length;j++){h+='<div class=lvi><span class=lvdot style=background:'+CC[j]+"></span>"+FC[j]+" "+diag.f[j]+(diag.f2?"→"+diag.f2[j]:"")+"</div>"}h+="</div>";
if(!diag.f2){h+='<div style=text-align:center;margin-top:4px><button class="btn bs bo" onclick=rt()>🌸 复测</button></div>'}else{h+='<div style=text-align:center;margin-top:4px><button class="btn bs bo" onclick=rt()>🌸 更新复测</button></div>'}h+="</div>"}
if(diag.b&&diag.b.some(function(v){return v!=""})){h+='<div class=cd><div class=ch><span class=ct>✦ 核心信念</span></div><div class=ovd>';for(var j=0;j<10;j++){if(diag.b[j]){h+="<div>• "+diag.b[j]+"</div>"}}h+="</div></div>"}
if(s.length>0){var scs=s.map(function(x){return x.s});if(scs.length>1){h+='<div class=cd><div class=ch><span class=ct>✦ 感受变化</span></div><div class=cw><canvas id=cht width=600 height=160></canvas></div>';
var la=scs[scs.length-1];var fi=scs[0];h+='<div class=ll><div class="lc lc1"><div class=lct>第一次</div><div class=lcn>'+fi+'<span style=font-size:12px;color:var(--text2)>/10</span></div><div class=lcs>'+s[0].d+"</div></div>";
h+='<div class="lc lc2"><div class=lct>最近一次</div><div class=lcn>'+la+'<span style=font-size:12px;color:var(--text2)>/10</span></div><div class=lcs>'+s[s.length-1].d+"</div></div></div>"}
h+='<div class=stt><h2>旅程记录 <span style=font-size:12px;font-weight:400;color:var(--text2)>(点击可编辑)</span></h2><span style=font-size:12px;color:var(--text2)>共 '+s.length+" 次</span></div><div class=tl>";
for(var i=s.length-1;i>=0;i--){var x=s[i];h+='<div class=ti data-si='+i+'><div class=tih><span class=tidm>'+DC[x.di]+"</span><span class=tis>"+x.s+'<span style=font-size:12px;font-weight:400;color:var(--text2)>/10</span></span></div><div class=tid>第'+(i+1)+'次 · '+x.d+"</div>";if(x.b){h+='<div class=til>信念：'+x.b+"</div>"}if(x.g){h+='<div class=til><span style=color:var(--primary)>✦</span> '+x.g+"</div>"}if(x.i){h+='<div class=til>'+x.i+"</div>"}h+="</div>"}
h+="</div>"}else{h+="<div class=cd><div style=text-align:center;padding:20px;color:var(--text2)>还没有记录</div></div>"}
if(r.length>0){h+='<div class=stt style=margin-top:12px><h2>阶段复盘</h2></div><div class=tl>';
for(var i=r.length-1;i>=0;i--){var x=r[i];h+='<div class=tr data-ri='+i+'><div class=tih><span class=ctag'+(x.t.includes("终")?' ctag2':'')+">"+x.t+"</span><span style=font-size:12px;color:var(--text2)>"+x.d+"</span></div>";h+='<div class=til style=margin-top:4px><b>总体感受：</b>'+x.st+'</div>';if(x.ch){h+='<div class=til><b>变化：</b>'+x.ch+'</div>'}if(x.nx){h+='<div class=til><b>下一步：</b>'+x.nx+'</div>'}h+="</div>"}
h+="</div>"}
h+='<div style=text-align:center;margin-bottom:12px><button class="btn bs bo" onclick=rv()>+ 阶段复盘</button></div>';
a.innerHTML=h;if(diag.f&&diag.f.some(function(v){return v>0})){drwFlower()}if(s.length>1){drwChart(scs)}}
function drwFlower(){var cv=document.getElementById("flower");if(!cv)return;var cx=cv.getContext("2d");var r=95,xc=130,yc=150;cx.clearRect(0,0,260,280);
cx.strokeStyle="#ede8e2";for(var g=1;g<=5;g++){var gr=r*g/5;cx.beginPath();for(var i=0;i<=8;i++){var a2=Math.PI/2-Math.PI*2*(i%8)/8;var x=xc+Math.cos(a2)*gr,y=yc-Math.sin(a2)*gr;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.stroke()}
if(diag.f2){cx.beginPath();for(var i=0;i<=8;i++){var idx=i%8;var v=diag.f2[idx]/10;var a2=Math.PI/2-Math.PI*2*idx/8;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.fillStyle="rgba(184,134,91,0.08)";cx.fill();cx.strokeStyle="#b8865b";cx.lineWidth=3;cx.stroke();for(var i=0;i<8;i++){var v=diag.f2[i]/10;var a2=Math.PI/2-Math.PI*2*i/8;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;cx.beginPath();cx.arc(x,y,5,0,Math.PI*2);cx.fillStyle=CC[i];cx.fill()}}
cx.beginPath();for(var i=0;i<=8;i++){var idx=i%8;var v=diag.f[idx]/10;var a2=Math.PI/2-Math.PI*2*idx/8;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}cx.fillStyle="rgba(150,150,150,0.1)";cx.fill();cx.strokeStyle="#c9a88e";cx.lineWidth=2;cx.setLineDash([4,4]);cx.stroke();
for(var i=0;i<8;i++){var v=diag.f[i]/10;var a2=Math.PI/2-Math.PI*2*i/8;var x=xc+Math.cos(a2)*r*v,y=yc-Math.sin(a2)*r*v;cx.beginPath();cx.arc(x,y,4,0,Math.PI*2);cx.fillStyle="#c9a88e";cx.fill()}
cx.font="10px sans-serif";cx.fillStyle="#8a7f76";cx.textAlign="center";cx.textBaseline="middle";for(var i=0;i<8;i++){var a2=Math.PI/2-Math.PI*2*i/8;var lr=r+18;var x=xc+Math.cos(a2)*lr,y=yc-Math.sin(a2)*lr;cx.textAlign=x<xc-5?"right":x>xc+5?"left":"center";cx.fillText(FC[i].substring(0,4),x,y)}}
function drwChart(scs){var cv=document.getElementById("cht");if(!cv)return;var cx=cv.getContext("2d");var w=cv.width,h=cv.height;cx.clearRect(0,0,w,h);var n=scs.length;if(n<2)return;var pad={l:25,r:10,t:12,b:22},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;cx.strokeStyle="#ede8e2";
for(var i=0;i<=10;i++){var y2=pad.t+ch*(1-i/10);cx.beginPath();cx.moveTo(pad.l,y2);cx.lineTo(w-pad.r,y2);cx.stroke()}

function ds(){var h="<div class=mt>编辑起点信息</div>";h+='<div class=gp><label class=lb>名字</label><input class=ip id=dn value="'+(diag.n||"")+'"></div>';h+='<div class=gp><label class=lb>开始时间</label><input class=ip id=dd type=date value="'+(diag.d||"")+'"></div>';
